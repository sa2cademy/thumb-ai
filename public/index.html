<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THUMB AI — 썸네일 픽커</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="/youtubei.min.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: rgba(255,255,255,0.04);
    --surface2: rgba(255,255,255,0.06);
    --surface3: rgba(255,255,255,0.1);
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --accent: #3182f6;
    --accent2: #5b9cf6;
    --accent-bg: rgba(49,130,246,0.08);
    --accent-glow: rgba(49,130,246,0.15);
    --text: #ececec;
    --text2: #b0b0b0;
    --muted: #555;
    --muted2: #888;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 2px 16px rgba(0,0,0,0.2);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', sans-serif;
    min-height: 100vh;
  }
  .container { max-width: 640px; margin: 0 auto; padding: 48px 20px 80px; }

  /* 헤더 */
  header { margin-bottom: 40px; display: flex; align-items: center; gap: 14px; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 1.5px; line-height: 1; color: var(--text); }
  .logo span { color: var(--accent); }
  .logo-sub { font-size: 12px; color: var(--muted2); letter-spacing: 0.04em; font-weight: 400; }

  /* API 키 */
  .api-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .api-label { font-size: 11px; color: var(--muted2); white-space: nowrap; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
  .api-input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-size: 13px; }
  .api-input::placeholder { color: var(--muted); }
  .api-toggle { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 15px; transition: color 0.2s; }
  .api-toggle:hover { color: var(--text); }

  /* 카드 */
  .card { background: var(--surface); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 16px; transition: border-color 0.3s; }
  .card:hover { border-color: var(--border2); }
  .card-header { padding: 18px 20px; display: flex; align-items: center; gap: 12px; }
  .step-badge { width: 26px; height: 26px; border-radius: 8px; background: var(--accent); color: #fff; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 2px 8px var(--accent-glow); }
  .card-title { font-size: 15px; font-weight: 600; }
  .card-body { padding: 0 20px 20px; }

  /* 입력/버튼 */
  .row { display: flex; gap: 10px; }
  .url-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 16px; color: var(--text);
    font-family: 'Pretendard', sans-serif; font-size: 15px; outline: none; transition: all 0.25s;
  }
  .url-input:focus { border-color: var(--accent); background: var(--accent-bg); box-shadow: 0 0 0 3px var(--accent-glow); }
  .url-input::placeholder { color: var(--muted); }

  .btn { padding: 14px 24px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-family: 'Pretendard', sans-serif; font-size: 14px; font-weight: 600; transition: all 0.2s; white-space: nowrap; }
  .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 2px 10px var(--accent-glow); }
  .btn-primary:hover { background: var(--accent2); box-shadow: 0 4px 16px var(--accent-glow); }
  .btn-primary:active { transform: scale(0.97); }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-sm { padding: 10px 16px; font-size: 13px; border-radius: 8px; }
  .btn-glow { animation: btnGlow 2s ease-in-out infinite; }
  @keyframes btnGlow { 0%,100%{ box-shadow:0 2px 10px var(--accent-glow); } 50%{ box-shadow:0 4px 24px rgba(49,130,246,0.35); } }
  .caption-copy.btn-glow { animation: copyGlow 2s ease-in-out infinite; }
  @keyframes copyGlow { 0%,100%{ box-shadow:0 0 8px var(--accent-glow); border-color:var(--accent); color:var(--accent); } 50%{ box-shadow:0 0 18px rgba(49,130,246,0.3); } }
  .btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--surface3); border-color: var(--border2); color: var(--text); }

  /* 진행 상태 */
  #status-box { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
  .status-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted2); margin-bottom: 12px; font-weight: 600; }
  .progress-wrap { background: var(--border); border-radius: 100px; height: 4px; margin-bottom: 10px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 100px; transition: width 0.4s ease; width: 0%; }
  .status-text { font-size: 13px; color: var(--muted2); }

  /* 글로벌 로딩 */
  .loading-bar { display:none; background:var(--surface); backdrop-filter:blur(20px); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:16px; }
  .loading-bar.show { display:block; animation:fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .loading-inner { display:flex; align-items:center; gap:14px; }
  .spinner { width:24px; height:24px; border:2.5px solid var(--border2); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; flex-shrink:0; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading-step { font-size:15px; color:var(--text); font-weight:600; }
  .loading-sub { font-size:13px; color:var(--muted2); margin-top:4px; }
  .loading-progress { margin-top:16px; background:var(--border); border-radius:100px; height:4px; overflow:hidden; }
  .loading-progress-fill { height:100%; background:linear-gradient(90deg, var(--accent), var(--accent2)); border-radius:100px; transition:width 0.5s ease; width:0%; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .loading-pulse { animation:pulse 1.5s ease-in-out infinite; }

  /* 비디오 미리보기 */
  #video-wrap { display: none; margin-top: 16px; }
  #preview-video { width: 100%; max-height: 360px; border-radius: var(--radius-sm); background: #000; object-fit: contain; }
  .video-info { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; gap: 12px; }
  .video-meta { font-size: 12px; color: var(--muted); }

  /* 프레임 그리드 */
  #frames-section { display: none; }
  .frames-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .frame-item { aspect-ratio: 9/16; border-radius: 4px; overflow: hidden; border: 2px solid transparent; position: relative; transition: border-color 0.2s; }
  .frame-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .frame-num { position: absolute; bottom: 3px; left: 3px; background: rgba(0,0,0,0.75); color: #fff; font-size: 9px; padding: 2px 5px; border-radius: 3px; font-weight: 700; }
  .frame-item.picked { border-color: var(--accent); }
  .frame-item.picked::after { content: '★'; position: absolute; top: 3px; right: 3px; background: var(--accent); color: #fff; font-size: 9px; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

  /* 결과 */
  #result-section { display: none; animation: slideUp 0.4s ease; }
  .result-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-top: 8px; }
  .result-title { font-size: 18px; font-weight: 700; }
  .result-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: all 0.25s; }
  .result-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.35); border-color: var(--border2); }
  .result-card.best { border-color: var(--accent); box-shadow: 0 4px 20px var(--accent-glow); }
  .result-rank { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); backdrop-filter:blur(8px); color: #fff; font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 8px; z-index: 1; }
  .result-card.best .result-rank { background: var(--accent); box-shadow: 0 2px 8px var(--accent-glow); }
  .img-wrap { aspect-ratio: 9/16; overflow: hidden; background: #000; position: relative; }
  .img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s; }
  .result-card:hover .img-wrap img { transform: scale(1.03); }
  .result-meta { padding: 10px 12px; }
  .result-reason { font-size: 12px; color: var(--muted2); line-height: 1.5; }

  /* 이미지 확대 모달 */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter:blur(12px); z-index: 1000; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; animation:fadeIn 0.2s ease; }
  .modal-content { position: relative; max-width: 380px; width: 90%; }
  .modal-content img { width: 100%; border-radius: var(--radius); display: block; box-shadow: 0 16px 48px rgba(0,0,0,0.4); }
  .modal-info { text-align: center; margin-top: 16px; }
  .modal-reason { font-size: 14px; color: var(--text2); margin-bottom: 14px; }
  .modal-save { padding: 12px 28px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-family: 'Pretendard', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition:all 0.2s; box-shadow: 0 2px 10px var(--accent-glow); }
  .modal-save:hover { background: var(--accent2); box-shadow: 0 4px 16px var(--accent-glow); }
  .modal-close { position: absolute; top: -44px; right: 0; background: var(--surface3); border: none; color: var(--text2); font-size: 18px; cursor: pointer; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; transition:all 0.2s; backdrop-filter:blur(8px); }
  .modal-close:hover { background:var(--surface3); color:var(--text); transform:scale(1.1); }

  /* 문장별 감정 */
  .tc-sentence-row { display:flex; gap:8px; align-items:center; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:8px 10px; }
  .tc-sentence-text { flex:1; font-size:12px; color:var(--text); line-height:1.5; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tc-emotion-select { background:var(--surface); border:1px solid var(--border); border-radius:4px; color:var(--text); font-size:11px; padding:4px 6px; font-family:'Pretendard',sans-serif; outline:none; flex-shrink:0; }

  /* 섹션 구분 */
  .section-divider { height:1px; background:var(--border); margin:24px 0; }

  /* 자막+썸네일 레이아웃 */
  .caption-box { background: var(--surface); backdrop-filter:blur(20px); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-top: 16px; animation:slideUp 0.4s ease; }
  .caption-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 8px; }
  .caption-label { font-size: 14px; font-weight: 600; display:flex; align-items:center; gap:8px; }
  .caption-label::before { content:''; width:3px; height:16px; background:var(--accent); border-radius:2px; }
  .caption-copy { padding: 7px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text2); font-size: 12px; cursor: pointer; font-family: 'Pretendard', sans-serif; font-weight: 500; transition:all 0.2s; }
  .caption-copy:hover { background:var(--accent-bg); border-color: var(--accent); color: var(--accent); }
  .caption-text { font-size: 13px; color: var(--muted2); line-height: 1.8; max-height: 200px; overflow-y: auto; white-space: pre-wrap; }

  /* TTS */
  .tts-controls { display: flex; gap: 8px; align-items: center; margin-top: 14px; flex-wrap: wrap; }
  .tts-audio { width: 100%; margin-top: 12px; border-radius: 8px; }

  /* 목소리 선택 */
  .voice-picker-btn { flex: 1; min-width: 150px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 13px; font-family: 'Pretendard', sans-serif; cursor: pointer; text-align: left; transition: all 0.2s; display: flex; align-items: center; gap: 10px; }
  .voice-picker-btn:hover { border-color: var(--accent); background: var(--accent-bg); }
  .voice-picker-btn img { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
  .voice-picker-btn .placeholder { width: 28px; height: 28px; border-radius: 50%; background: var(--border2); display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--muted); }

  .voice-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; max-height: 60vh; overflow-y: auto; padding: 4px; }
  .voice-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; cursor: pointer; transition: all 0.2s; display: flex; gap: 12px; align-items: center; }
  .voice-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .voice-card.selected { border-color: var(--accent); background: var(--accent-bg); }
  .voice-card-img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: var(--border); }
  .voice-card-info { flex: 1; min-width: 0; }
  .voice-card-name { font-size: 13px; font-weight: 600; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .voice-card-meta { font-size: 11px; color: var(--muted2); display: flex; gap: 6px; flex-wrap: wrap; }
  .voice-card-badge { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; font-size: 10px; }
  .voice-card-preview { background: none; border: 1px solid var(--border); border-radius: 50%; width: 30px; height: 30px; color: var(--muted2); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: all 0.2s; }
  .voice-card-preview:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

  /* 탭 */
  .main-tabs { display:flex; gap:4px; margin-bottom:24px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:4px; }
  .main-tab { flex:1; padding:12px; text-align:center; background:transparent; border:none; border-radius:12px; color:var(--muted2); font-size:14px; font-weight:600; cursor:pointer; font-family:'Pretendard',sans-serif; transition:all 0.25s; }
  .main-tab:hover { color:var(--text2); }
  .main-tab.active { background:var(--accent); color:#fff; box-shadow:0 2px 8px var(--accent-glow); }
  .tab-content { display:none; }
  .tab-content.active { display:block; animation:fadeIn 0.3s ease; }

  /* 파일 업로드 */
  .file-drop { border:2px dashed var(--border2); border-radius:var(--radius); padding:48px 20px; text-align:center; color:var(--muted); font-size:14px; cursor:pointer; transition:all 0.2s; }
  .file-drop:hover,.file-drop.dragover { border-color:var(--accent); color:var(--accent); background:var(--accent-bg); }

  canvas { display: none; }

  .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface3); backdrop-filter:blur(20px); border: 1px solid var(--border2); color: var(--text); padding: 14px 24px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; opacity: 0; transition: all 0.3s cubic-bezier(0.16,1,0.3,1); z-index: 9999; white-space: nowrap; pointer-events: none; box-shadow: var(--shadow); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .note { font-size: 12px; color: var(--muted); margin-top: 10px; line-height: 1.6; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="container">
  <header>
    <div>
      <div class="logo">THUMB<span>.</span>AI</div>
      <div class="logo-sub">Shorts Thumbnail Picker</div>
    </div>
    <a href="/script.html" style="margin-left:auto;padding:8px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--muted2);font-size:13px;font-weight:500;text-decoration:none;transition:all 0.2s;">설정</a>
  </header>


  <!-- 탭 -->
  <div class="main-tabs">
    <button class="main-tab active" onclick="switchTab('youtube')">YouTube</button>
    <button class="main-tab" onclick="switchTab('myvideos')">내 영상</button>
  </div>

  <!-- YouTube 탭 -->
  <div class="tab-content active" id="tab-youtube">
    <div class="card">
      <div class="card-header">
        <div class="step-badge">1</div>
        <div class="card-title">URL 입력</div>
      </div>
      <div class="card-body">
        <div class="row">
          <input type="text" id="yt-url" class="url-input" placeholder="YouTube URL 또는 기사 URL 붙여넣기">
          <button class="btn btn-primary" onclick="loadUrl()" id="load-btn">불러오기</button>
        </div>
        <p class="note">YouTube → 영상 음성 인식 · 기사 URL → 본문 추출 → 대본 생성</p>

        <!-- 영상 파일 드롭존 (서버 다운로드 실패 시 표시) -->
        <div id="video-drop-zone" style="display:none;margin-top:12px;border:2px dashed var(--border);border-radius:var(--radius);padding:28px 16px;text-align:center;cursor:pointer;transition:all 0.2s;"
          ondragover="event.preventDefault();this.style.borderColor='var(--accent)';this.style.color='var(--accent)'"
          ondragleave="this.style.borderColor='var(--border)';this.style.color='var(--muted2)'"
          ondrop="event.preventDefault();this.style.borderColor='var(--border)';this.style.color='var(--muted2)';handleVideoDrop(event)"
          onclick="document.getElementById('video-file-input').click()">
          <div style="font-size:13px;color:var(--muted2);font-weight:600;margin-bottom:6px;">서버 다운로드가 안 돼요</div>
          <div style="font-size:12px;color:var(--muted);">영상 파일을 여기에 드래그하거나 클릭해서 선택하세요</div>
          <input type="file" id="video-file-input" accept="video/*" style="display:none;" onchange="handleVideoFile(event)">
        </div>

        <div id="video-wrap">
          <video id="preview-video" controls playsinline muted></video>
          <div class="video-info">
            <span class="video-meta" id="video-meta"></span>
            <button class="btn btn-primary btn-sm" onclick="transcribeVideo()" id="stt-btn">🎙 음성 인식</button>
          </div>
        </div>

        <!-- 기사 본문 -->
        <div id="article-wrap" style="display:none;margin-top:16px;">
          <div style="font-size:11px;color:var(--muted);margin-bottom:8px;" id="article-source"></div>
          <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;font-size:13px;color:var(--muted2);line-height:1.8;max-height:200px;overflow-y:auto;white-space:pre-wrap;" id="article-content"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 내 영상 탭 -->
  <div class="tab-content" id="tab-myvideos">
    <div class="card">
      <div class="card-header">
        <div class="step-badge">1</div>
        <div class="card-title">내 영상 업로드</div>
      </div>
      <div class="card-body">
        <div class="file-drop" id="video-drop" onclick="document.getElementById('video-input').click()">
          <div style="font-size:32px;margin-bottom:8px;">🎬</div>
          영상 파일을 드래그하거나 클릭해서 업로드<br>
          <span style="font-size:11px;color:var(--muted);">mp4, mov, webm 지원</span>
          <input type="file" id="video-input" accept="video/*" style="display:none;">
        </div>

        <div id="my-video-wrap" style="display:none;margin-top:16px;">
          <video id="my-preview-video" controls playsinline muted style="width:100%;max-height:320px;border-radius:var(--radius-sm);background:#000;object-fit:contain;"></video>
          <div class="video-info" style="margin-top:12px;">
            <span class="video-meta" id="my-video-meta"></span>
            <button class="btn btn-primary btn-sm" onclick="analyzeMyVideo()" id="my-analyze-btn">🔍 AI 썸네일 분석</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 진행 상태 -->
    <div id="my-status-box" style="display:none;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px;">
      <div class="status-label">분석 중</div>

        <span style="font-size:15px;font-weight:600;">생성된 대본</span>
        <div style="display:flex;gap:8px;">
          <button class="caption-copy" onclick="saveScriptEdit()">저장</button>

        </div>

      <textarea id="script-editor" style="flex:1;min-height:400px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:16px;color:var(--text);font-size:14px;font-family:'Pretendard',sans-serif;line-height:2;resize:none;outline:none;"></textarea>

    <!-- TTS -->
    <div id="tts-controls" style="display:none;margin-top:14px;">
      <!-- 서비스 선택 탭 -->
      <div style="display:flex;gap:0;margin-bottom:10px;">
        <button class="caption-copy" id="tts-tab-eleven" onclick="switchTTSService('eleven')" style="border-radius:8px 0 0 8px;border-right:none;padding:7px 16px;">ElevenLabs</button>

        onclick="document.getElementById('prproj-upload').click()">
        프리미어 프로젝트 폴더를 여기에 드롭하거나 클릭

<!-- 이미지 확대 모달 -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <img id="modal-img" src="">
    <div class="modal-info">
      <div class="modal-reason" id="modal-reason"></div>
      <button class="modal-save" id="modal-save">이미지 저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let frames = [];

  // API 키는 설정 페이지에서 저장, 여기서는 localStorage에서 읽기만
  function getApiKey() { return localStorage.getItem('claude_api_key') || ''; }
  function getElevenKey() { return localStorage.getItem('eleven_api_key') || ''; }

  // ── 로딩 표시 ──
  function showLoading(step, sub, pct) {
    const bar = document.getElementById('loading-bar');
    bar.classList.add('show');
    document.getElementById('loading-step').textContent = step;
    document.getElementById('loading-sub').textContent = sub || '';
    if (pct !== undefined) document.getElementById('loading-fill').style.width = pct + '%';
  }
  function hideLoading() {
    document.getElementById('loading-bar').classList.remove('show');
    document.getElementById('loading-fill').style.width = '0%';
  }

  function toast(msg, ms = 3500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), ms);
  }

  function setProgress(pct, text) {
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('status-text').textContent = text;
  }

  function showStatus(v) {
    document.getElementById('status-box').style.display = v ? 'block' : 'none';
  }

  // ── 탭 전환 ──
  function switchTab(tab) {
    document.querySelectorAll('.main-tab').forEach((t, i) => {
      t.classList.toggle('active', (tab === 'youtube' && i === 0) || (tab === 'myvideos' && i === 1));
    });
    document.getElementById('tab-youtube').classList.toggle('active', tab === 'youtube');
    document.getElementById('tab-myvideos').classList.toggle('active', tab === 'myvideos');
  }

  // ── 내 영상 업로드 ──
  const videoDrop = document.getElementById('video-drop');
  const videoInput = document.getElementById('video-input');
  videoDrop.addEventListener('dragover', (e) => { e.preventDefault(); videoDrop.classList.add('dragover'); });
  videoDrop.addEventListener('dragleave', () => videoDrop.classList.remove('dragover'));
  videoDrop.addEventListener('drop', (e) => { e.preventDefault(); videoDrop.classList.remove('dragover'); loadMyVideo(e.dataTransfer.files[0]); });
  videoInput.addEventListener('change', (e) => { if (e.target.files[0]) loadMyVideo(e.target.files[0]); });

  let myFrames = [];

  function loadMyVideo(file) {
    const blobUrl = URL.createObjectURL(file);
    const video = document.getElementById('my-preview-video');
    video.src = blobUrl;
    video.onloadedmetadata = () => {
      document.getElementById('my-video-meta').textContent = `${file.name} · ${Math.round(video.duration)}초 · ${video.videoWidth}x${video.videoHeight}`;
    };
    document.getElementById('my-video-wrap').style.display = 'block';
    videoDrop.style.display = 'none';
  }

  function setMyProgress(pct, text) {
    document.getElementById('my-progress-fill').style.width = pct + '%';
    document.getElementById('my-status-text').textContent = text;
  }

  async function analyzeMyVideo() {
    const apiKey = getApiKey();
    if (!apiKey) { toast('설정에서 Claude API 키를 먼저 저장해주세요'); return; }

    const video = document.getElementById('my-preview-video');
    if (!video.src || !video.duration) { toast('먼저 영상을 업로드하세요'); return; }

    document.getElementById('my-analyze-btn').disabled = true;
    document.getElementById('my-result-section').style.display = 'none';
    myFrames = [];
    document.getElementById('my-status-box').style.display = 'block';
    setMyProgress(5, '준비 중...');

    try {
      const count = Math.min(60, Math.max(10, Math.round(video.duration * 1)));
      myFrames = await extractFrames(video, count, setMyProgress);

      setMyProgress(60, 'AI 분석 중...');
      const gridImg = await buildGrid(myFrames);
      const b64 = gridImg.split(',')[1];

      const apiRes = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-opus-4-5',
          max_tokens: 512,
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } },
              { type: 'text', text: `유튜브 쇼츠 영상에서 추출한 ${myFrames.length}개 프레임입니다. 각 프레임에 번호와 타임스탬프가 있습니다.

썸네일로 가장 좋은 프레임 4개를 선택해주세요.

선택 기준 (우선순위 순):
1. 인물의 얼굴이 크고 선명하게 보이는 프레임
2. 선명하고 밝은 화면
3. 자막/텍스트/오버레이가 없는 깨끗한 프레임 우선 (자막 있으면 감점)
4. 인물이 중앙에 있고 잘리지 않은 구도

reason 작성 규칙 (매우 중요):
- 프레임에 실제로 보이는 것만 묘사하세요.
- 사람 얼굴이 안 보이면 "얼굴 안 보임"이라고 쓰세요.
- 자막/텍스트가 보이면 반드시 "자막 있음"이라고 쓰세요.
- 손만 보이면 "손만 보임"이라고 쓰세요.
- "미소", "표정" 등은 얼굴이 실제로 선명하게 보일 때만 쓰세요.
- 절대로 추측하거나 꾸며내지 마세요.

JSON만 반환 (다른 텍스트 없이):
{"picks":[{"rank":1,"frame":프레임번호,"reason":"실제 보이는 내용(25자이내)"},{"rank":2,"frame":프레임번호,"reason":"이유"},{"rank":3,"frame":프레임번호,"reason":"이유"},{"rank":4,"frame":프레임번호,"reason":"이유"}]}` }
            ]
          }]
        })
      });

      const apiData = await apiRes.json();
      if (apiData.error) throw new Error(apiData.error.message);
      const raw = apiData.content[0].text.replace(/```json|```/g, '').trim();
      const { picks } = JSON.parse(raw);

      setMyProgress(100, '완료!');
      setTimeout(() => {
        document.getElementById('my-status-box').style.display = 'none';
        renderMyResults(picks);
      }, 400);

    } catch(e) {
      document.getElementById('my-status-box').style.display = 'none';
      toast('분석 실패: ' + e.message);
      console.error(e);
    }
    document.getElementById('my-analyze-btn').disabled = false;
  }

  function renderMyResults(picks) {
    const grid = document.getElementById('my-result-grid');
    grid.innerHTML = '';
    picks.forEach(p => {
      const frame = myFrames.find(f => f.index === p.frame);
      if (!frame) return;
      const div = document.createElement('div');
      div.className = 'result-card' + (p.rank === 1 ? ' best' : '');
      div.onclick = () => openModal(frame.dataUrl, frame.index, p.reason);
      div.innerHTML = `
        <div class="img-wrap">
          <div class="result-rank">${p.rank === 1 ? 'BEST' : '#' + p.rank}</div>
          <img src="${frame.dataUrl}">
        </div>
        <div class="result-meta">
          <div class="result-reason">${p.reason}</div>
        </div>`;
      grid.appendChild(div);
    });
    document.getElementById('my-result-section').style.display = 'block';
    document.getElementById('my-result-section').scrollIntoView({ behavior: 'smooth' });
  }

  function resetMyResults() {
    document.getElementById('my-result-section').style.display = 'none';
    myFrames = [];
  }

  // ── URL 판별 ──
  function isYouTubeUrl(url) {
    return /youtube\.com|youtu\.be/.test(url);
  }

  async function loadUrl() {
    const url = document.getElementById('yt-url').value.trim();
    if (!url) { toast('URL을 입력해주세요'); return; }

    // 초기화
    document.getElementById('video-wrap').style.display = 'none';
    document.getElementById('article-wrap').style.display = 'none';

    if (isYouTubeUrl(url)) {
      loadVideo();
    } else {
      await loadArticle(url);
    }
  }

  // ── 기사 본문 추출 ──
  async function loadArticle(url) {
    const btn = document.getElementById('load-btn');
    btn.disabled = true;
    btn.textContent = '추출 중...';
    showLoading('기사 본문 추출 중', '페이지에서 텍스트를 가져오고 있어요', 30);

    try {
      const res = await fetch(`/api/article?url=${encodeURIComponent(url)}`);
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || '기사 추출 실패 (' + res.status + ')');
      }
      const data = await res.json();
      if (!data.body || data.body.length < 30) throw new Error('본문을 추출할 수 없습니다');

      document.getElementById('article-source').textContent = data.title || url;
      document.getElementById('article-content').textContent = data.body;
      document.getElementById('article-wrap').style.display = 'block';

      // 자막 섹션에 기사 본문 넣기 (대본 생성용)
      document.getElementById('caption-content').textContent = data.body;
      document.getElementById('caption-preview').textContent = data.body.slice(0, 60) + '...';
      document.getElementById('caption-section').style.display = 'block';

      hideLoading();
      toast('기사 본문 추출 완료!');

      showPresetSelect();
      const genBtn = document.getElementById('gen-script-btn');
      if (genBtn && genBtn.style.display !== 'none') genBtn.classList.add('btn-glow');

    } catch(e) {
      toast('기사 추출 실패: ' + e.message);
      hideLoading();
    }

    btn.disabled = false;
    btn.textContent = '불러오기';
  }

  // ── YouTube 영상 불러오기 ──
  async function loadVideo() {
    const url = document.getElementById('yt-url').value.trim();
    if (!url) { toast('URL을 입력해주세요'); return; }

    const btn = document.getElementById('load-btn');
    btn.disabled = true;
    btn.textContent = '불러오는 중...';
    showLoading('영상 다운로드 중', 'YouTube에서 영상을 가져오고 있어요', 10);

    try {
      console.log('[영상] youtubei.js 클라이언트 시작:', url);
      const videoId = url.match(/(?:shorts\/|v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/)?.[1];
      if (!videoId) throw new Error('올바른 YouTube URL이 아닙니다');

      // youtubei.js를 프록시 fetch로 초기화 (CORS 우회)
      const proxyFetch = async (input, init) => {
        const reqUrl = typeof input === 'string' ? input : input.url;
        const reqInit = typeof input === 'string' ? (init || {}) : input;
        // YouTube API 요청만 프록시, 나머지는 직접
        if (reqUrl.includes('youtube.com') || reqUrl.includes('googlevideo.com') || reqUrl.includes('google.com')) {
          let bodyText = null;
          if (reqInit.body) {
            bodyText = typeof reqInit.body === 'string' ? reqInit.body : await new Response(reqInit.body).text();
          }
          const proxyRes = await fetch('/api/download', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              url: reqUrl,
              method: reqInit.method || 'GET',
              headers: Object.fromEntries(new Headers(reqInit.headers || {}).entries()),
              body: bodyText,
            })
          });
          return proxyRes;
        }
        return fetch(input, init);
      };

      const yt = await Innertube.create({ fetch: proxyFetch });
      console.log('[영상] Innertube 초기화 완료');

      const info = await yt.getBasicInfo(videoId);
      const format = info.chooseFormat({ type: 'video+audio', quality: 'best' });
      console.log('[영상] 포맷:', format.quality_label, format.mime_type);

      const streamUrl = await format.decipher(yt.session.player);
      console.log('[영상] 스트림 URL 획득, 다운로드 시작...');

      // googlevideo CDN에서 직접 다운로드 시도, CORS 실패 시 프록시 fallback
      let blob;
      try {
        const directRes = await fetch(streamUrl);
        if (!directRes.ok) throw new Error(directRes.status);
        blob = await directRes.blob();
        console.log('[영상] 직접 다운로드 성공');
      } catch (e) {
        console.log('[영상] 직접 다운로드 실패, 프록시로 시도...', e.message);
        const proxyRes = await fetch('/api/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: streamUrl, method: 'GET', headers: { 'Referer': 'https://www.youtube.com/' } })
        });
        if (!proxyRes.ok) throw new Error('영상 다운로드 실패: ' + proxyRes.status);
        blob = await proxyRes.blob();
        console.log('[영상] 프록시 다운로드 성공');
      }
      console.log('[영상] blob 크기:', (blob.size / 1024 / 1024).toFixed(2), 'MB');
      const blobUrl = URL.createObjectURL(blob);

      const video = document.getElementById('preview-video');
      video.src = blobUrl;
      video.onloadedmetadata = () => {

  // ── 프레임 추출 ──
  function extractFrames(video, count, progressFn) {
    const onProgress = progressFn || setProgress;
    return new Promise(resolve => {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const result = [];
      const dur = video.duration;
      const times = Array.from({ length: count }, (_, i) => dur * (i + 1) / (count + 1));
      let idx = 0;

      const next = () => {
        if (idx >= times.length) { resolve(result); return; }
        video.currentTime = times[idx];
      };

      video.onseeked = () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        result.push({ index: idx + 1, time: times[idx], dataUrl: canvas.toDataURL('image/jpeg', 0.88) });
        idx++;
        onProgress(10 + idx / times.length * 45, `프레임 추출 중... ${idx}/${times.length}`);
        next();
      };

      next();
    });
  }

  // ── 그리드 이미지 생성 ──
  function buildGrid(frames, cols = 5) {
    const tw = 180, th = Math.round(tw * 16 / 9), lh = 22, pad = 4;
    const rows = Math.ceil(frames.length / cols);
    const c = document.createElement('canvas');
    c.width = cols * (tw + pad) + pad;
    c.height = rows * (th + lh + pad) + pad;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, c.width, c.height);

    return new Promise(resolve => {
      let done = 0;
      frames.forEach((f, i) => {
        const img = new Image();
        img.onload = () => {
          const col = i % cols, row = Math.floor(i / cols);
          const x = pad + col * (tw + pad), y = pad + row * (th + lh + pad);
          ctx.drawImage(img, x, y, tw, th);
          ctx.fillStyle = 'rgba(0,0,0,0.75)';
          ctx.fillRect(x, y + th, tw, lh);
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 11px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(`${f.index} · ${Math.round(f.time)}s`, x + tw / 2, y + th + 15);
          if (++done === frames.length) resolve(c.toDataURL('image/jpeg', 0.88));
        };
        img.src = f.dataUrl;
      });
    });
  }

  // ── 음성 인식 (Whisper in Web Worker) ──
  let whisperWorker = null;

  async function transcribeVideo() {
    const video = document.getElementById('preview-video');
    if (!video.src || !video.duration) { toast('먼저 영상을 불러오세요'); return; }

    const btn = document.getElementById('stt-btn');
    btn.classList.remove('btn-glow');
    btn.disabled = true;
    btn.textContent = '오디오 추출...';

    document.getElementById('caption-section').style.display = 'block';
    document.getElementById('caption-content').textContent = '영상에서 오디오 추출 중...';

    try {
      // 1. 오디오 추출 (메인 스레드에서 - AudioContext는 Worker에서 못 씀)
      const audioCtx = new OfflineAudioContext(1, 16000 * Math.ceil(video.duration), 16000);
      const response = await fetch(video.src);
      const arrayBuffer = await response.arrayBuffer();
      const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

      const source = audioCtx.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(audioCtx.destination);
      source.start();
      const rendered = await audioCtx.startRendering();
      const audioData = rendered.getChannelData(0);

      // 2. Worker로 Whisper 처리 넘기기
      if (!whisperWorker) {
        whisperWorker = new Worker('/whisper-worker.js', { type: 'module' });
      }

      btn.textContent = '음성 인식 중...';
      showLoading('음성 인식 준비 중', 'Whisper 모델을 불러오고 있어요 (첫 실행만 오래 걸려요)', 40);

      whisperWorker.onmessage = (e) => {
        const { type, text, result, message } = e.data;

        if (type === 'status') {
          const isFetching = text.includes('다운로드');
          const isRecognizing = text.includes('인식 중');
          showLoading(
            isFetching ? '모델 다운로드 중' : isRecognizing ? '음성 인식 중' : '처리 중',
            isFetching ? '약 40MB, 첫 실행만 필요해요' : isRecognizing ? '잠시만 기다려주세요...' : text,
            isFetching ? 50 : isRecognizing ? 70 : 60
          );
        } else if (type === 'result') {
          console.log('[STT] 결과:', result);
          if (result.chunks && result.chunks.length) {
            const html = result.chunks.map(c => {
              const sec = Math.floor(c.timestamp[0]);
              return `<span style="color:var(--muted);font-size:11px;">${sec}s</span> ${c.text.trim()}`;
            }).join('<br>');
            document.getElementById('caption-content').innerHTML = html;
          } else if (result.text) {
            document.getElementById('caption-content').textContent = result.text;
          } else {
            document.getElementById('caption-content').textContent = '인식된 음성이 없습니다.';
          }
          hideLoading();
          updateCaptionPreview();
          toast('음성 인식 완료!');
          showPresetSelect();
          btn.disabled = false;
          btn.textContent = '🎙 음성 인식';
          const genBtn = document.getElementById('gen-script-btn');
          if (genBtn && genBtn.style.display !== 'none') genBtn.classList.add('btn-glow');
        } else if (type === 'error') {
          document.getElementById('caption-content').textContent = '음성 인식 실패: ' + message;
          toast('음성 인식 실패');
          hideLoading();
          btn.disabled = false;
          btn.textContent = '🎙 음성 인식';
        }
      };

      // Float32Array는 transferable
      const audioArr = new Float32Array(audioData);
      whisperWorker.postMessage({ type: 'transcribe', audioData: audioArr }, [audioArr.buffer]);

    } catch(e) {
      console.error('[STT] 에러:', e);
      document.getElementById('caption-content').textContent = '음성 인식 실패: ' + e.message;
      toast('음성 인식 실패');
      btn.disabled = false;
      btn.textContent = '🎙 음성 인식';
    }
  }

  // ── ElevenLabs TTS ──
  async function generateElevenTTS(text) {
    const apiKey = getElevenKey();
    if (!apiKey) throw new Error('ElevenLabs API 키가 없습니다');

    const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${selectedVoice.voice_id}/with-timestamps`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'xi-api-key': apiKey },
      body: JSON.stringify({ text, model_id: 'eleven_multilingual_v2', voice_settings: { stability: 0.5, similarity_boost: 0.75 } })
    });
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.detail?.message || '음성 생성 실패 (' + res.status + ')'); }

    const data = await res.json();
    const audioBytes = Uint8Array.from(atob(data.audio_base64), c => c.charCodeAt(0));
    const { characters: chars, character_start_times_seconds: starts, character_end_times_seconds: ends } = data.alignment;

    // 긴 공백 트리밍
    const MAX_PAUSE = 1.0, REPLACE_PAUSE = 0.3;
    const pauses = [];
    for (let i = 1; i < chars.length; i++) {
      const gap = starts[i] - ends[i - 1];
      if (gap > MAX_PAUSE) pauses.push({ index: i, gapStart: ends[i - 1], gapEnd: starts[i], gap });
    }

    let finalBlob, adjStarts = starts, adjEnds = ends;

    if (pauses.length > 0) {
      const audioCtx = new AudioContext();
      const origBuffer = await audioCtx.decodeAudioData(audioBytes.buffer.slice(0));
      const sr = origBuffer.sampleRate, numCh = origBuffer.numberOfChannels;

      const segments = []; let segStart = 0;
      for (const p of pauses) { segments.push({ s: segStart, e: p.gapStart + REPLACE_PAUSE/2 }); segStart = p.gapEnd - REPLACE_PAUSE/2; }
      segments.push({ s: segStart, e: origBuffer.duration });

      let trimmed = 0; for (const p of pauses) trimmed += (p.gap - REPLACE_PAUSE);
      const offCtx = new OfflineAudioContext(numCh, Math.ceil((origBuffer.duration - trimmed) * sr), sr);
      let dt = 0;
      for (const seg of segments) { const d = seg.e - seg.s; if (d <= 0) continue; const src = offCtx.createBufferSource(); src.buffer = origBuffer; src.connect(offCtx.destination); src.start(dt, seg.s, d); dt += d; }
      finalBlob = audioBufferToWav(await offCtx.startRendering());
      audioCtx.close();

      adjStarts = [...starts]; adjEnds = [...ends];
      let off = 0, pi = 0;
      for (let i = 0; i < chars.length; i++) { while (pi < pauses.length && i >= pauses[pi].index) { off += (pauses[pi].gap - REPLACE_PAUSE); pi++; } adjStarts[i] = starts[i] - off; adjEnds[i] = ends[i] - off; }
      console.log(`[TTS] 공백 ${pauses.length}곳 트리밍 (${trimmed.toFixed(1)}초 단축)`);
    } else {
      finalBlob = new Blob([audioBytes], { type: 'audio/mpeg' });
    }

    ttsSrtData = buildSRT(chars, adjStarts, adjEnds);
    showTTSResult(finalBlob, pauses.length > 0 ? `음성 생성 완료! (공백 ${pauses.length}곳 트리밍)` : '음성 생성 완료!');
  }

  // ── Typecast TTS (문장별 감정) ──
  let tcSentences = [];

  function splitSentences(text) {
    // 1차: 줄바꿈으로 분리
    let lines = text.split('\n').map(s => s.trim()).filter(s => s.length > 0);
    // 2차: 각 줄을 문장부호로 분리
    let result = [];
    for (const line of lines) {
      const parts = line.split(/(?<=[.!?。！？~])\s*/g).map(s => s.trim()).filter(s => s.length > 0);
      result.push(...parts);
    }
    // 3차: 40자 초과 문장은 쉼표/띄어쓰기 기준으로 추가 분할
    const final = [];
    for (const s of result) {
      if (s.length <= 40) { final.push(s); continue; }
      // 쉼표로 분할 시도
      const commaParts = s.split(/(?<=[,，])\s*/g).map(p => p.trim()).filter(p => p.length > 0);
      if (commaParts.length > 1) {
        // 쉼표 분할 후에도 긴 것은 중간 공백에서 자름
        for (const cp of commaParts) {
          if (cp.length <= 50) { final.push(cp); continue; }
          const mid = Math.ceil(cp.length / 2);
          const sp = cp.indexOf(' ', mid - 10);
          const idx = sp > 0 ? sp : mid;
          final.push(cp.slice(0, idx).trim());
          final.push(cp.slice(idx).trim());
        }
      } else {
        const mid = Math.ceil(s.length / 2);
        const sp = s.indexOf(' ', mid - 10);
        const idx = sp > 0 ? sp : mid;
        final.push(s.slice(0, idx).trim());
        final.push(s.slice(idx).trim());
      }
    }
    return final.filter(s => s.length > 0);
  }

  async function generateTypecastTTS(text) {
    const apiKey = getTypecastKey();
    if (!apiKey) throw new Error('Typecast API 키가 없습니다');

    const selects = document.querySelectorAll('.tc-emotion-select');
    const sentences = tcSentences.length > 0 ? tcSentences : [text];
    const emotions = sentences.map((_, i) => selects[i]?.value || 'normal');
    const allSame = emotions.every(e => e === emotions[0]);

    const btn = document.getElementById('tts-btn');

    if (allSame) {
      // 감정 동일 → 전체 텍스트 한번에 생성
      btn.textContent = '생성 중...';
      const res = await fetch('https://api.typecast.ai/v1/text-to-speech', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-API-KEY': apiKey },
        body: JSON.stringify({
          text, model: 'ssfm-v30', voice_id: selectedVoice.voice_id,
          prompt: { emotion_type: 'preset', emotion_preset: emotions[0] }
        })
      });
      if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.message || e.detail || '생성 실패'); }

      const blob = await res.blob();
      const tmpUrl = URL.createObjectURL(blob);
      const duration = await getAudioDuration(tmpUrl);
      URL.revokeObjectURL(tmpUrl);
      ttsSrtData = buildSRTFromText(text, duration);
      showTTSResult(blob, '음성 생성 완료!');

    } else {
      // 감정 다름 → 문장별 생성 후 Web Audio API로 합치기
      const audioBuffers = [];
      const audioCtx = new AudioContext();

      for (let i = 0; i < sentences.length; i++) {
        btn.textContent = `생성 중... (${i + 1}/${sentences.length})`;

        const res = await fetch('https://api.typecast.ai/v1/text-to-speech', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-API-KEY': apiKey },
          body: JSON.stringify({
            text: sentences[i], model: 'ssfm-v30', voice_id: selectedVoice.voice_id,
            prompt: { emotion_type: 'preset', emotion_preset: emotions[i] }
          })
        });
        if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.message || e.detail || `문장 ${i+1} 실패`); }

        const arrBuf = await res.arrayBuffer();
        const decoded = await audioCtx.decodeAudioData(arrBuf);
        audioBuffers.push(decoded);
      }

      // AudioBuffer 합치기
      const sr = audioBuffers[0].sampleRate;
      const numCh = audioBuffers[0].numberOfChannels;
      const GAP_SAMPLES = Math.round(0.05 * sr); // 50ms 간격
      const totalLen = audioBuffers.reduce((sum, b) => sum + b.length, 0) + GAP_SAMPLES * (audioBuffers.length - 1);

      const offCtx = new OfflineAudioContext(numCh, totalLen, sr);
      let offset = 0;
      const durations = [];
      for (let i = 0; i < audioBuffers.length; i++) {
        const src = offCtx.createBufferSource();
        src.buffer = audioBuffers[i];
        src.connect(offCtx.destination);
        src.start(offset / sr);
        durations.push(audioBuffers[i].duration);
        offset += audioBuffers[i].length;
        if (i < audioBuffers.length - 1) offset += GAP_SAMPLES;
      }

      const rendered = await offCtx.startRendering();
      const combinedBlob = audioBufferToWav(rendered);
      audioCtx.close();

      // SRT 생성 (실측 기반)
      const GAP_SEC = GAP_SAMPLES / sr;
      let time = 0;
      const srtEntries = sentences.map((s, i) => {
        const start = time;
        const end = time + durations[i];
        time = end + GAP_SEC;
        return { text: s, start, end };
      });
      const srtFinal = [];
      for (const e of srtEntries) {
        if (e.text.length <= 40) { srtFinal.push(e); continue; }
        const mid = Math.ceil(e.text.length / 2);
        const sp = e.text.indexOf(' ', mid - 10);
        const idx = sp > 0 ? sp : mid;
        const mt = e.start + (e.end - e.start) * (idx / e.text.length);
        srtFinal.push({ text: e.text.slice(0, idx).trim(), start: e.start, end: mt });
        srtFinal.push({ text: e.text.slice(idx).trim(), start: mt, end: e.end });
      }
      ttsSrtData = srtFinal.map((s, i) => `${i+1}\n${fmtSrtTime(s.start)} --> ${fmtSrtTime(s.end)}\n${s.text}`).join('\n\n');

      showTTSResult(combinedBlob, `음성 생성 완료! (${sentences.length}문장, 감정 혼합)`);
    }
  }

  function getAudioDuration(url) {
    return new Promise((resolve) => {
      const a = new Audio();
      a.addEventListener('loadedmetadata', () => resolve(a.duration));
      a.addEventListener('error', () => resolve(0));
      a.src = url;
    });
  }

  // 텍스트 기반 SRT (타임스탬프 없을 때 - 문장별 균등 분배)
  function buildSRTFromText(text, duration) {
    if (!duration) return null;
    // 문장 분리
    const raw = text.split(/(?<=[.!?。！？\n])\s*/g).map(s => s.trim()).filter(s => s.length > 0);
    // 문장이 없으면 줄바꿈으로 분리
    const sentences = raw.length > 1 ? raw : text.split('\n').map(s => s.trim()).filter(s => s.length > 0);
    if (!sentences.length) return null;

    // 글자 수 비율로 시간 배분 (문장 사이 0.1초 간격)
    const GAP = 0.1;
    const totalGap = GAP * (sentences.length - 1);
    const speechTime = Math.max(0, duration - totalGap);
    const totalChars = sentences.reduce((sum, s) => sum + s.length, 0);
    let time = 0;
    const entries = sentences.map((s, i) => {
      const start = time;
      const dur = (s.length / totalChars) * speechTime;
      time += dur;
      const end = time;
      if (i < sentences.length - 1) time += GAP;
      return { text: s, start, end };
    });

    // 40자 초과 분할
    const final = [];
    for (const e of entries) {
      if (e.text.length <= 40) { final.push(e); continue; }
      const mid = Math.ceil(e.text.length / 2);
      const sp = e.text.indexOf(' ', mid - 10);
      const idx = sp > 0 ? sp : mid;
      const midTime = e.start + (e.end - e.start) * (idx / e.text.length);
      final.push({ text: e.text.slice(0, idx).trim(), start: e.start, end: midTime });
      final.push({ text: e.text.slice(idx).trim(), start: midTime, end: e.end });
    }

    return final.map((s, i) => `${i + 1}\n${fmtSrtTime(s.start)} --> ${fmtSrtTime(s.end)}\n${s.text}`).join('\n\n');
  }

  function showTTSResult(blob, msg) {
    if (ttsAudioUrl) URL.revokeObjectURL(ttsAudioUrl);
    ttsAudioUrl = URL.createObjectURL(blob);
    document.getElementById('tts-audio').src = ttsAudioUrl;
    document.getElementById('tts-audio').style.display = 'block';
    document.getElementById('tts-download').style.display = 'flex';
    document.getElementById('tts-export').style.display = 'block';
    toast(msg);
  }

  // SRT 생성: 문장 단위로 자막 분할
  function buildSRT(chars, starts, ends) {
    // 캐릭터를 문장 단위로 그룹핑
    const sentences = [];
    let cur = { text: '', start: null, end: null };

    for (let i = 0; i < chars.length; i++) {
      if (cur.start === null) cur.start = starts[i];
      cur.text += chars[i];
      cur.end = ends[i];

      // 문장 끝 감지: .!? 또는 줄바꿈, 또는 긴 공백
      const isEnd = /[.!?。！？\n]/.test(chars[i]);
      const hasGap = i < chars.length - 1 && (starts[i + 1] - ends[i]) > 0.5;

      if ((isEnd || hasGap) && cur.text.trim().length > 0) {
        sentences.push({ text: cur.text.trim(), start: cur.start, end: cur.end });
        cur = { text: '', start: null, end: null };
      }
    }
    if (cur.text.trim().length > 0) {
      sentences.push({ text: cur.text.trim(), start: cur.start, end: cur.end });
    }

    // 너무 긴 자막은 분할 (40자 초과 시)
    const final = [];
    for (const s of sentences) {
      if (s.text.length <= 40) {
        final.push(s);
      } else {
        const mid = Math.ceil(s.text.length / 2);
        const splitAt = s.text.indexOf(' ', mid - 10);
        const idx = splitAt > 0 ? splitAt : mid;
        const midTime = s.start + (s.end - s.start) * (idx / s.text.length);
        final.push({ text: s.text.slice(0, idx).trim(), start: s.start, end: midTime });
        final.push({ text: s.text.slice(idx).trim(), start: midTime, end: s.end });
      }
    }

    // SRT 포맷
    return final.map((s, i) => {
      return `${i + 1}\n${fmtSrtTime(s.start)} --> ${fmtSrtTime(s.end)}\n${s.text}`;
    }).join('\n\n');
  }

  function fmtSrtTime(sec) {
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = Math.floor(sec % 60);
    const ms = Math.round((sec % 1) * 1000);
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')},${String(ms).padStart(3,'0')}`;
  }

  // WAV 인코더 (트리밍된 오디오용)
  function audioBufferToWav(buffer) {
    const numCh = buffer.numberOfChannels;
    const sr = buffer.sampleRate;
    const format = 1; // PCM
    const bitsPerSample = 16;
    const samples = buffer.length;
    const byteRate = sr * numCh * bitsPerSample / 8;
    const blockAlign = numCh * bitsPerSample / 8;
    const dataSize = samples * blockAlign;
    const headerSize = 44;
    const buf = new ArrayBuffer(headerSize + dataSize);
    const view = new DataView(buf);

    const writeStr = (offset, str) => { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); };
    writeStr(0, 'RIFF');
    view.setUint32(4, 36 + dataSize, true);
    writeStr(8, 'WAVE');
    writeStr(12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, format, true);
    view.setUint16(22, numCh, true);
    view.setUint32(24, sr, true);
    view.setUint32(28, byteRate, true);
    view.setUint16(32, blockAlign, true);
    view.setUint16(34, bitsPerSample, true);
    writeStr(36, 'data');
    view.setUint32(40, dataSize, true);

    const channels = [];
    for (let ch = 0; ch < numCh; ch++) channels.push(buffer.getChannelData(ch));

    let offset = 44;
    for (let i = 0; i < samples; i++) {
      for (let ch = 0; ch < numCh; ch++) {
        const s = Math.max(-1, Math.min(1, channels[ch][i]));
        view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        offset += 2;
      }
    }

    return new Blob([buf], { type: 'audio/wav' });
  }

  function downloadTTS() {
    if (!ttsAudioUrl) return;
    const a = document.createElement('a');
    a.href = ttsAudioUrl;
    a.download = currentTTSService === 'typecast' ? 'tts_audio.wav' : 'tts_audio.mp3';
    a.click();
  }

  function downloadSRT() {
    if (!ttsSrtData) { toast('SRT 데이터가 없습니다'); return; }
    const blob = new Blob([ttsSrtData], { type: 'text/srt' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'tts_subtitle.srt';
    a.click();
  }

  // ── SRT 파싱 (프로젝트 파일 생성용) ──
  function parseSRT(srt) {
    if (!srt) return [];
    return srt.trim().split('\n\n').map(block => {
      const lines = block.split('\n');
      if (lines.length < 3) return null;
      const times = lines[1].split(' --> ');
      return {
        text: lines.slice(2).join('\n'),
        start: srtTimeToSec(times[0]),
        end: srtTimeToSec(times[1])
      };
    }).filter(Boolean);
  }

  function srtTimeToSec(t) {
    const [h, m, rest] = t.split(':');
    const [s, ms] = rest.split(',');
    return +h * 3600 + +m * 60 + +s + +ms / 1000;
  }

  // ── 캡컷 프로젝트 내보내기 ──
  function exportCapcut() {
    if (!ttsAudioUrl) { toast('먼저 음성을 생성하세요'); return; }
    const subs = parseSRT(ttsSrtData);

    const uid = () => crypto.randomUUID?.() || Math.random().toString(36).slice(2);
    const audioId = uid();
    const audioMatId = uid();

    // 오디오 길이 (ms)
    const audio = document.getElementById('tts-audio');
    const durationMs = Math.round((audio.duration || 30) * 1000);

    const draft = {
      id: uid(),
      name: 'TTS_Project',
      create_time: Math.floor(Date.now() / 1000),
      duration: durationMs * 1000, // microseconds
      fps: 30,
      canvas_config: { width: 1080, height: 1920, ratio: '9:16' },
      materials: {
        audios: [{
          id: audioMatId,
          duration: durationMs * 1000,
          local_material_id: audioId,
          name: 'tts_audio',
          path: 'tts_audio.wav',
          type: 'extract_music'
        }],
        texts: subs.map((s, i) => ({
          id: uid(),
          content: JSON.stringify({ text: s.text }),
          font_size: 8.0,
          font_color: '#FFFFFF',
          alignment: 1,
          _idx: i
        })),
        videos: [],
        images: []
      },
      tracks: [
        {
          type: 'audio',
          attribute: 0,
          segments: [{
            id: uid(),
            material_id: audioMatId,
            target_timerange: { start: 0, duration: durationMs * 1000 },
            source_timerange: { start: 0, duration: durationMs * 1000 }
          }]
        },
        {
          type: 'text',
          attribute: 0,
          segments: subs.map((s, i) => ({
            id: uid(),
            material_id: draft?.materials?.texts?.[i]?.id || uid(),
            target_timerange: {
              start: Math.round(s.start * 1000000),
              duration: Math.round((s.end - s.start) * 1000000)
            }
          }))
        }
      ]
    };

    // text material id 매핑 수정
    const textMats = draft.materials.texts;
    draft.tracks[1].segments.forEach((seg, i) => {
      if (textMats[i]) seg.material_id = textMats[i].id;
    });

    const blob = new Blob([JSON.stringify(draft, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'draft_content.json';
    a.click();
    toast('캡컷 프로젝트 파일 다운로드 완료 (draft_content.json)');
  }

  // ── 프리미어 프로젝트 폴더 처리 ──
  async function exportPremiereAuto() {
    if (!ttsAudioUrl || !ttsSrtData) { toast('먼저 음성을 생성하세요'); return; }

    // 설정에 등록된 prproj가 있으면 바로 처리 (폴더 없이 prproj만)
    const savedData = localStorage.getItem('prproj_data');
    const savedName = localStorage.getItem('prproj_name');
    if (savedData && savedName) {
      const binary = atob(savedData);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      await processPremiereProject([{ name: savedName, data: bytes.buffer, isPrproj: true }], savedName.replace('.prproj', ''));
    } else {
      // 폴더 업로드 또는 드롭 요청
      document.getElementById('prproj-drop-zone').style.display = 'block';
    }
  }

  // 폴더 선택 (input webkitdirectory)
  async function handlePrprojFolderUpload(e) {
    if (!ttsAudioUrl || !ttsSrtData) { toast('먼저 음성을 생성하세요'); return; }
    const fileList = Array.from(e.target.files);
    if (!fileList.length) return;

    // 폴더명 추출
    const folderName = fileList[0].webkitRelativePath?.split('/')[0] || 'project';
    const files = [];
    for (const f of fileList) {
      const relPath = f.webkitRelativePath || f.name;
      files.push({ name: relPath, data: await f.arrayBuffer(), isPrproj: f.name.endsWith('.prproj') });
    }
    await processPremiereProject(files, folderName);
    e.target.value = '';
  }

  // 폴더 드롭
  async function handlePrprojFolderDrop(e) {
    if (!ttsAudioUrl || !ttsSrtData) { toast('먼저 음성을 생성하세요'); return; }

    const items = e.dataTransfer.items;
    const files = [];
    let folderName = 'project';

    const readEntry = async (entry, path) => {
      if (entry.isFile) {
        const file = await new Promise(r => entry.file(r));
        const relPath = path + file.name;
        files.push({ name: relPath, data: await file.arrayBuffer(), isPrproj: file.name.endsWith('.prproj') });
      } else if (entry.isDirectory) {
        if (!path) folderName = entry.name;
        const reader = entry.createReader();
        const entries = await new Promise(r => reader.readEntries(r));
        for (const ent of entries) await readEntry(ent, path + entry.name + '/');
      }
    };

    for (const item of items) {
      const entry = item.webkitGetAsEntry?.();
      if (entry) await readEntry(entry, '');
    }

    if (files.length === 0) { toast('파일을 찾을 수 없습니다'); return; }
    await processPremiereProject(files, folderName);
  }

  // 폴더 내 .prproj 수정 + 오디오/SRT 추가 → ZIP
  async function processPremiereProject(files, folderName) {
    const status = document.getElementById('prproj-status');
    status.style.display = 'block';
    status.textContent = '프로젝트 처리 중...';

    try {
      // .prproj 찾기
      const prprojFile = files.find(f => f.isPrproj);
      if (!prprojFile) { toast('.prproj 파일을 찾을 수 없습니다'); status.style.display = 'none'; return; }

      // 1. prproj gzip 해제
      status.textContent = '.prproj 파일 분석 중...';
      const ds = new DecompressionStream('gzip');
      const w = ds.writable.getWriter();
      w.write(new Uint8Array(prprojFile.data)); w.close();
      const r = ds.readable.getReader();
      const chunks = [];
      while (true) { const { done, value } = await r.read(); if (done) break; chunks.push(value); }
      const decoded = new Uint8Array(chunks.reduce((a, c) => a + c.length, 0));
      let off = 0; for (const c of chunks) { decoded.set(c, off); off += c.length; }
      let xmlStr = new TextDecoder().decode(decoded);

      // 2. timebase 추출
      const subs = parseSRT(ttsSrtData);
      const audioEl = document.getElementById('tts-audio');
      const durationSec = audioEl.duration || 30;
      const tbMatch = xmlStr.match(/<TimeBase>(\d+)<\/TimeBase>/);
      const fps = tbMatch ? parseInt(tbMatch[1]) : 30;
      const totalFrames = Math.round(durationSec * fps);
      const secToFrames = (s) => Math.round(s * fps);

      const uid = () => {
        const h = () => Math.floor(Math.random() * 0xffffffff).toString(16).padStart(8, '0');
        return `${h()}-${h().slice(0,4)}-${h().slice(0,4)}-${h().slice(0,4)}-${h()}${h().slice(0,4)}`;
      };

      // 3. 오디오 트랙 주입
      status.textContent = '오디오 트랙 주입 중...';
      const audioTrackXml = `
      <AudioClipTrack ObjectUID="${uid()}">
        <ClipItems>
          <ClipItem ObjectUID="${uid()}">
            <Name>tts_audio</Name>
            <Start>0</Start>
            <End>${totalFrames}</End>
            <InPoint>0</InPoint>
            <OutPoint>${totalFrames}</OutPoint>
            <FilePath>tts_audio.wav</FilePath>
          </ClipItem>
        </ClipItems>
      </AudioClipTrack>`;

      const audioGroupIdx = xmlStr.indexOf('</AudioClipTrackGroup>');
      if (audioGroupIdx !== -1) {
        xmlStr = xmlStr.slice(0, audioGroupIdx) + audioTrackXml + xmlStr.slice(audioGroupIdx);
      }

      // 4. 다시 gzip 압축
      status.textContent = '프로젝트 재압축 중...';
      const cs = new CompressionStream('gzip');
      const csW = cs.writable.getWriter();
      csW.write(new TextEncoder().encode(xmlStr)); csW.close();
      const csR = cs.readable.getReader();
      const compChunks = [];
      while (true) { const { done, value } = await csR.read(); if (done) break; compChunks.push(value); }
      const compLen = compChunks.reduce((a, c) => a + c.length, 0);
      const compressed = new Uint8Array(compLen);
      let cOff = 0; for (const c of compChunks) { compressed.set(c, cOff); cOff += c.length; }

      // 5. ZIP 생성 - 원본 폴더 구조 유지 + prproj만 교체 + 오디오/SRT 추가
      status.textContent = 'ZIP 패키지 생성 중...';
      const audioBlob = await fetch(ttsAudioUrl).then(r => r.blob());
      const audioArr = await audioBlob.arrayBuffer();

      const zip = new JSZip();
      // 원본 파일들 그대로 추가 (prproj만 수정본으로 교체)
      for (const f of files) {
        if (f.isPrproj) {
          zip.file(f.name, compressed);
        } else {
          zip.file(f.name, f.data);
        }
      }

      // 오디오 + SRT를 prproj와 같은 경로에 추가
      const prprojDir = prprojFile.name.includes('/') ? prprojFile.name.substring(0, prprojFile.name.lastIndexOf('/') + 1) : '';
      zip.file(prprojDir + 'tts_audio.wav', audioArr);
      zip.file(prprojDir + 'tts_subtitle.srt', ttsSrtData);

      const zipBlob = await zip.generateAsync({ type: 'blob' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(zipBlob);
      a.download = folderName + '.zip';
      a.click();

      status.textContent = '완료! 압축 풀고 .prproj를 실행하세요.';
      document.getElementById('prproj-drop-zone').style.display = 'none';
      toast('프로젝트 다운로드 완료!');
    } catch(err) {
      console.error('[Premiere] 에러:', err);
      status.textContent = '처리 실패: ' + err.message;
      toast('❌ ' + err.message);
    }
  }
